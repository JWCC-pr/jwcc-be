<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 이메일 인증</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: #f5f5f5;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f5f5f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 30px 40px;">
                            <table border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" style="padding-top: 16px;">
                                        <h1 style="margin: 0; font-size: 20px; font-weight: 600; color: #333333;">잠원동 성당</h1>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Main Content -->
                    <tr>
                        <td style="padding: 0 40px 40px 40px;">
                            <h2 style="margin: 0 0 20px 0; font-size: 24px; font-weight: 600; color: #333333; text-align: center;">이메일 인증 코드</h2>

                            <p style="margin: 0 0 24px 0; font-size: 15px; line-height: 1.6; color: #666666; text-align: center;">
                                안녕하세요,<br>
                                아래의 인증 코드를 입력하여 이메일 인증을 완료해주세요.
                            </p>

                            <!-- Verification Code Box -->
                            <table width="100%" border="0" cellspacing="0" cellpadding="0" style="margin: 30px 0;">
                                <tr>
                                    <td align="center">
                                        <div style="background-color: #f8f8f8; border: 2px dashed #771B3D; border-radius: 8px; padding: 24px; display: inline-block;">
                                            <p style="margin: 0 0 8px 0; font-size: 13px; color: #999999; text-align: center;">인증 코드</p>
                                            <p style="margin: 0; font-size: 32px; font-weight: 700; color: #771B3D; letter-spacing: 8px; font-family: 'Courier New', monospace; text-align: center;">
                                                {{ code }}</p>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <div style="background-color: #fff9f0; border-left: 4px solid #ffa726; padding: 16px; margin: 24px 0; border-radius: 4px;">
                                <p style="margin: 0; font-size: 13px; line-height: 1.6; color: #666666;">
                                    <strong style="color: #333333;">유의사항:</strong><br>
                                    • 이 코드는 발송 시점으로부터 <strong>3일간</strong> 유효합니다.<br>
                                    • 타인에게 코드를 공유하지 마세요.<br>
                                    • 본인이 요청하지 않은 경우, 이 이메일을 무시하세요.
                                </p>
                            </div>

                        </td>
                    </tr>

                </table>

                <!-- Footer Note -->
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="margin-top: 20px;">
                    <tr>
                        <td style="padding: 0 20px;">
                            <p style="margin: 0; font-size: 11px; line-height: 1.5; color: #999999; text-align: center;">
                                본 메일은 발신 전용이므로 회신되지 않습니다.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
