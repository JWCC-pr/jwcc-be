<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가입 승인 안내</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: #f5f5f5;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f5f5f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 30px 40px;">
                            <table border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center" style="padding-top: 16px;">
                                        <h1 style="margin: 0; font-size: 20px; font-weight: 600; color: #333333;">잠원동 성당</h1>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Main Content -->
                    <tr>
                        <td style="padding: 0 40px 40px 40px;">
                            <h2 style="margin: 0 0 20px 0; font-size: 24px; font-weight: 600; color: #333333; text-align: center;">회원가입 승인</h2>

                            <p style="margin: 0 0 24px 0; font-size: 15px; line-height: 1.6; color: #666666; text-align: center;">
                                <strong style="color: #771B3D;">{{ name }}</strong>님, 환영합니다!<br>
                                잠원동 성당의 회원으로 승인되신 것을 진심으로 축하드립니다.
                            </p>

                            <!-- Account Info Box -->
                            <div style="background-color: #f8f8f8; border-radius: 8px; padding: 24px; margin: 30px 0;">
                                <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                    <tr>
                                        <td style="padding: 8px 0; border-bottom: 1px solid #e0e0e0;">
                                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                                <tr>
                                                    <td style="width: 100px;">
                                                        <p style="margin: 0; font-size: 13px; color: #999999;">이메일</p>
                                                    </td>
                                                    <td>
                                                        <p style="margin: 0; font-size: 14px; color: #333333;">{{ email }}</p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td style="padding: 8px 0;">
                                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                                <tr>
                                                    <td style="width: 100px;">
                                                        <p style="margin: 0; font-size: 13px; color: #999999;">승인일시</p>
                                                    </td>
                                                    <td>
                                                        <p style="margin: 0; font-size: 14px; color: #333333;">{{ approval_date }}</p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>
                            </div>

                            <!-- Login Button -->
                            <table width="100%" border="0" cellspacing="0" cellpadding="0" style="margin: 30px 0;">
                                <tr>
                                    <td align="center">
                                        <a href="{{ login_url }}" style="display: inline-block; background-color: #771B3D; color: #ffffff; text-decoration: none; padding: 16px 48px; border-radius: 6px; font-size: 16px; font-weight: 600;">로그인하기</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                </table>

                <!-- Footer Note -->
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="margin-top: 20px;">
                    <tr>
                        <td style="padding: 0 20px;">
                            <p style="margin: 0; font-size: 11px; line-height: 1.5; color: #999999; text-align: center;">
                                본 메일은 발신 전용이므로 회신되지 않습니다.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
